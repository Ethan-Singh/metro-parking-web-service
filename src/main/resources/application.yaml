spring:
  application:
    name: metro-parking-web-service
  mongodb:
    host: localhost
    port: 27017

service:
  open-data:
    apikey: ${OPEN_DATA_APIKEY}
  networking:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS}

management:
  endpoints:
    web:
      base-path: ${ACTUATOR_BASE_PATH:/actuator}
      exposure:
        include: health, readiness, startup

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: false
  swagger-ui:
    display-request-duration: true
    path: /v3/swagger-ui.html
    enabled: false
  show-actuator: false

server:
  port: 8080
