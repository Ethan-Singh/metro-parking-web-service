---
spring:
  application:
    name: metro-parking-web-service
  data:
    mongodb:
      host: localhost
      port: 27017
      database: parking
      auto-index-creation: true
logging:
  level:
    root: INFO
    com.example.metro_parking_web_service: INFO
    sun.rmi: INFO
    javax.management: INFO
service:
  cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS}"
management:
  endpoints:
    web:
      base-path: "${ACTUATOR_BASE_PATH:/actuator}"
      exposure:
        include: "health, readiness, startup"
springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    display-request-duration: true
  show-actuator: false
server:
  port: 8080
external-server:
  parking:
    base-url: "${PARKING_BASE_URL}"
    api: "${PARKING_API}"
    apikey: "${PARKING_APIKEY}"
    disabled-facilities: "1,2,3,4,5"
