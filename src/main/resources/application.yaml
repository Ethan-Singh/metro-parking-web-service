---
spring:
  application:
    name: metro-parking-web-service
  mongodb:
    uri: "${MONGODB_URI:mongodb://localhost:27017/metro-parking-database}"
logging:
  level:
    root: INFO
    com.example.metro_parking_web_service: INFO
    sun.rmi: INFO
    javax.management: INFO
management:
  endpoints:
    web:
      base-path: "${ACTUATOR_BASE_PATH:/actuator}"
      exposure:
        include: "health, readiness, startup"
springdoc:
  api-docs:
    enabled: "${API_DOCS:false}"
    path: /v3/api-docs
  swagger-ui:
    enabled: "${SWAGGER_UI:false}"
    path: /swagger-ui.html
    display-request-duration: true
  show-actuator: false
server:
  port: 8080
  compression:
    enabled: true
    mime-types:
    - application/json
    min-response-size: 1024
external-server:
  parking:
    base-url: "${PARKING_BASE_URL:}"
    api: "${PARKING_API:}"
    apikey: "${PARKING_APIKEY:}"
    policy:
      disabled-facilities:
      - 1
      - 2
      - 3
      - 4
      - 5
      backfill-window: 31
    analytics:
      almost-full-threshold: 0.1
    security:
      allowed-origins: "${ALLOWED_ORIGINS:[http://localhost:5173]}"
      rate-limit:
        capacity: 60
        refill-tokens: 60
        refill-period-seconds: 60
resilience4j:
  circuitbreaker:
    instances:
      parkingClient:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 80
        register-health-indicator: true
  retry:
    instances:
      parkingClient:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
        retry-exceptions:
        - org.springframework.web.client.ResourceAccessException
        - java.io.IOException
